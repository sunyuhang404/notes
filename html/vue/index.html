<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="app">
    {{ name }}
  </div>
  <script>
    class Dep {
      constructor() {
        this.subs = [];
      }
      addWatcher(watcher) {
        this.subs.push(watcher);
      }
      notify() {
        this.subs.forEach(watcher => watcher.update());
      }
    }

    class Watcher {
      constructor(vm, key, cb) {
        this.vm = vm;
        this.cb = cb;
        this.key = key;
        this.value = this.get();
      }
      update() {
        this.run();
      }
      run() {
        const value = this.vm.data[this.key];
        const oldValue = this.value;
        if (value !== oldValue) {
          this.value = value;
          this.cb.call(this.vm, value, oldValue);
        }
      }
      get() {
        window.target = this;
        const value = this.vm.data[this.key];
        window.target = null;
        return value;
      }
    }

    function Observer(data) {
      if (!data || typeof data !== 'object') {
        return;
      }
      Object.keys(data).forEach(key => reactive(data, key, data[key]));
    }

    function reactive(data, key, value) {
      Observer(value);
      const dep = new Dep();
      Object.defineProperty(data, key, {
        configurable: true,
        enumerable: true,
        get: function() {
          if (window.target) {
            dep.addWatcher(window.target);
          }
          return value;
        },
        set: function(newValue) {
          if (value === newValue) {
            return;
          }
          value = newValue;
          dep.notify();
        }
      });
    }

    window.target = null;

    function Vue(options) {
      this.data = options.data;
      Object.keys(this.data).forEach(key => {
        this.proxyKeys(key);
      })
      Observer(this.data);
      const element = document.querySelector(options.el);
      element.innerHTML = this.data.name;
      new Watcher(this, 'name', value => {
        element.innerHTML = value;
      });
    }
    Vue.prototype = {
      proxyKeys: function(key) {
        Object.defineProperty(this, key, {
          enumerable: true,
          configurable: true,
          get: function() {
            return this.data[key]
          },
          set: function(newValue) {
            this.data[key] = newValue;
          }
        })
      }
    }

    const vue = new Vue({
      el: '#app',
      data: {
        name: 'test1'
      }
    })

    setTimeout(() => {
      vue.name = 'asdasdfadsa'
    }, 1000);
  </script>
</body>
</html>
